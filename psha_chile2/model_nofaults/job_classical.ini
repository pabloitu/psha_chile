[general]

description = Hazard Chile
calculation_mode = classical
random_seed = 23

[geometry]
sites_csv = chile_005.csv

[logic_tree]
number_of_logic_tree_samples = 0

[erf]
rupture_mesh_spacing = 5.0
complex_fault_mesh_spacing = 10.0
width_of_mfd_bin = 0.1
area_source_discretization = 10.0

# pointsource_distance = 75
# ps_grid_spacing = 50

[site_params]
# the GMPEs defined in the 'gmpe_logic_tree.xml' depend on vs30 only,
reference_vs30_value = 380
reference_vs30_type = inferred
reference_depth_to_2pt5km_per_sec = 2.0
reference_depth_to_1pt0km_per_sec = 40.0


[calculation]
source_model_logic_tree_file = source_logictree.xml
gsim_logic_tree_file = gmm_logictree.xml
investigation_time = 1.0
intensity_measure_types_and_levels = {"PGA": logscale(0.0005, 3.00, 25)}
# truncation occurs at 3 sigma
truncation_level = 3
# integration distance is set to 200 km
# maximum_distance = 300.0
pointsource_distance = 300.0

maximum_distance = {
                    'Subduction Interface': 700.0,
                    'Subduction IntraSlab': 300.0,
                    'default': 200.0}


[output]
export_dir = ./results
individual_rlzs = true
uniform_hazard_spectra = false
poes = 0.002105
